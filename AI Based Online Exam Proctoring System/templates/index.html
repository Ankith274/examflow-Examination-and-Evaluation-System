<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Online Exam Proctoring</title>
    <!-- Basic styling and animations -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <!-- Socket.IO library for real-time bidirectional event-based communication -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Online Exam Proctoring System</h1>
            <div id="status" class="status-indicator">● Connecting...</div>
        </header>
        
        <main class="dashboard">
            <!-- Left Side: Video Feed & Controls -->
            <div class="video-container">
                <div class="video-wrapper">
                    <!-- Raw user webcam -->
                    <video id="videoElement" autoplay playsinline muted></video>
                    <!-- Hidden canvas for capturing frames -->
                    <canvas id="canvasElement" style="display:none;"></canvas>
                    <!-- Display image processed round-trip from the server -->
                    <img id="processedImage" alt="Proctored Video" style="display: none;" />
                </div>
                
                <div class="controls">
                    <button id="startExamBtn" class="btn primary">Start Exam</button>
                    <button id="endExamBtn" class="btn danger" disabled>End Exam</button>
                    <label class="toggle-processed">
                        <input type="checkbox" id="showProcessed" /> 
                        Show Processed View (Draws Boxes)
                    </label>
                </div>
            </div>
            
            <!-- Right Side: AI Alerts Log -->
            <div class="alerts-container">
                <h2>Real-Time AI Alerts</h2>
                <ul id="alertsList">
                    <li class="alert-info">System initialized. Waiting to start...</li>
                </ul>
            </div>
            
            <!-- Bottom: Dummy Exam Content -->
            <div class="exam-content">
                <h2>Exam Paper: General Knowledge</h2>
                
                <div class="question">
                    <p><strong>1. Which of the following is NOT an AI technique?</strong></p>
                    <label><input type="radio" name="q1" value="A"> A. Machine Learning</label><br>
                    <label><input type="radio" name="q1" value="B"> B. Natural Language Processing</label><br>
                    <label><input type="radio" name="q1" value="C"> C. Computer Vision</label><br>
                    <label><input type="radio" name="q1" value="D"> D. Hypertext Markup Language</label>
                </div>

                <div class="question" style="margin-top: 20px;">
                    <p><strong>2. Who is known as the father of Artificial Intelligence?</strong></p>
                    <label><input type="radio" name="q2" value="A"> A. Alan Turing</label><br>
                    <label><input type="radio" name="q2" value="B"> B. John McCarthy</label><br>
                    <label><input type="radio" name="q2" value="C"> C. Charles Babbage</label><br>
                    <label><input type="radio" name="q2" value="D"> D. Elon Musk</label>
                </div>
            </div>
        </main>
    </div>

    <!-- Frontend logic for WebRTC and SocketIO -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
