<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Page Not Found | ExamFlow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050710;color:#f0f4ff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.num{font-family:'Syne',sans-serif;font-size:120px;font-weight:800;letter-spacing:-4px;background:linear-gradient(135deg,#3b82f6,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin:16px 0 10px}
p{color:#94a3b8;font-size:15px;margin-bottom:32px}
a{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;text-decoration:none;font-weight:700;font-size:14px;transition:all .2s}
a:hover{opacity:.88;transform:translateY(-1px)}
</style>
</head>
<body>
<div class="num">404</div>
<h1>Page Not Found</h1>
<p>The page you're looking for doesn't exist or has been moved.</p>
<a href="index.html">🏠 Back to ExamFlow Home</a>
</body>
</html>
