# ════════════════════════════════════════════
# ExamFlow — Netlify Configuration
# KLH University · BCA Final Year 2026
# Deploy: Drag & drop OR connect GitHub
# ════════════════════════════════════════════

[build]
  publish = "."       # Deploy everything in root folder
  command = ""        # No build step needed for pure HTML

[build.environment]
  NODE_VERSION = "18"

# Redirect rules — serve index.html for all routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache HTML files for short time
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
